<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #000;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #0A0A0A;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  /* 背景グラデーション */
  .bg-glow-left {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,47,190,0.25) 0%, transparent 70%);
    top: -100px;
    left: -100px;
  }

  .bg-glow-right {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
    bottom: -100px;
    right: 200px;
  }

  /* グリッドライン */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(123,47,190,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,47,190,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* 左：ブランド */
  .left {
    position: relative;
    z-index: 10;
    padding-left: 90px;
    width: 520px;
    flex-shrink: 0;
  }

  .brand-sub {
    font-size: 13px;
    letter-spacing: 4px;
    color: #7B2FBE;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .brand-main {
    font-size: 52px;
    font-weight: 900;
    color: #F5F5F5;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .brand-main span {
    background: linear-gradient(90deg, #7B2FBE, #00D4FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-tagline {
    font-size: 13px;
    color: #666;
    letter-spacing: 2px;
  }

  /* 区切り線 */
  .divider {
    position: relative;
    z-index: 10;
    width: 1px;
    height: 160px;
    background: linear-gradient(180deg, transparent, #7B2FBE, #00D4FF, transparent);
    margin: 0 60px;
    flex-shrink: 0;
  }

  /* 中央：メインコピー */
  .center {
    position: relative;
    z-index: 10;
    flex: 1;
  }

  .copy-main {
    font-size: 42px;
    font-weight: 900;
    color: #F5F5F5;
    line-height: 1.3;
    margin-bottom: 20px;
  }

  .copy-main .highlight {
    color: #00D4FF;
  }

  .copy-sub {
    font-size: 15px;
    color: #888;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* 右：タグ */
  .right {
    position: relative;
    z-index: 10;
    padding-right: 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
  }

  .tag {
    padding: 8px 18px;
    border: 1px solid;
    border-radius: 4px;
    font-size: 13px;
    letter-spacing: 1px;
    text-align: center;
    font-weight: 600;
  }

  .tag-purple {
    border-color: #7B2FBE;
    color: #7B2FBE;
    background: rgba(123,47,190,0.1);
  }

  .tag-cyan {
    border-color: #00D4FF;
    color: #00D4FF;
    background: rgba(0,212,255,0.08);
  }

  .tag-gray {
    border-color: #3A3A3A;
    color: #666;
    background: transparent;
  }

  /* 下ライン */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #7B2FBE, #00D4FF, #7B2FBE);
    z-index: 10;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="bg-glow-left"></div>
  <div class="bg-glow-right"></div>
  <div class="grid"></div>

  <div class="left">
    <div class="brand-sub">× Playgic</div>
    <div class="brand-main">REBEL<br><span>SHEEP</span></div>
    <div class="brand-tagline">自由とレバレッジ</div>
  </div>

  <div class="divider"></div>

  <div class="center">
    <div class="copy-main">
      借金で、資産を作る。<br>
      全部<span class="highlight">見せる。</span>
    </div>
    <div class="copy-sub">
      証券担保ローン・eBay輸出・YouTube<br>
      頑張らないのになぜか増える仕組みを実験中
    </div>
  </div>

  <div class="right">
    <div class="tag tag-purple">証券担保ローン</div>
    <div class="tag tag-cyan">eBay 輸出</div>
    <div class="tag tag-gray">YouTube毎週土曜</div>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>
