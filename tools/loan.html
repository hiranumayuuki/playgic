<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>証券担保ローン シミュレーター — Playgic Tools</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080810; --bg2:#0d0d1a; --accent:#7c5cfc; --accent2:#a78bfa;
      --cyan:#22d3ee; --green:#10b981; --red:#f87171; --white:#f1f0ff; --gray:#8b8aa8; --border:rgba(124,92,252,.2);
    }
    body { background:var(--bg); color:var(--white); font-family:'Inter',sans-serif; min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(124,92,252,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(124,92,252,.04) 1px,transparent 1px);
      background-size:60px 60px; pointer-events:none; z-index:0;
    }
    nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; height:64px;
      background:rgba(8,8,16,.9); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { font-size:14px; font-weight:800; letter-spacing:.15em; background:linear-gradient(135deg,var(--accent2),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-back { font-size:13px; color:var(--gray); text-decoration:none; transition:color .2s; }
    .nav-back:hover { color:var(--white); }
    .wrap { max-width:1000px; margin:0 auto; padding:48px 32px; position:relative; z-index:1; }
    .page-header { margin-bottom:48px; }
    .page-header h1 { font-size:32px; font-weight:800; margin-bottom:8px; }
    .page-header p { color:var(--gray); font-size:14px; line-height:1.7; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:32px; }
    @media(max-width:700px) { .grid { grid-template-columns:1fr; } }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:32px; }
    .card-title { font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--accent2); margin-bottom:24px; }
    .field { margin-bottom:20px; }
    .field label { display:block; font-size:12px; font-weight:500; color:var(--gray); margin-bottom:8px; }
    .field input { width:100%; background:rgba(124,92,252,.08); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:16px; color:var(--white); font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; }
    .field input:focus { border-color:var(--accent2); }
    .result-row { display:flex; justify-content:space-between; align-items:baseline; padding:14px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .result-row:last-child { border-bottom:none; }
    .result-label { font-size:13px; color:var(--gray); }
    .result-val { font-size:20px; font-weight:700; }
    .result-val.green { background:linear-gradient(135deg,var(--green),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .result-val.red { color:var(--red); }
    .result-val.white { color:var(--white); }
    .big-result { text-align:center; padding:28px; margin-top:24px; background:rgba(124,92,252,.07); border:1px solid var(--border); border-radius:12px; }
    .big-result-label { font-size:12px; color:var(--gray); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
    .big-result-num { font-size:48px; font-weight:900; letter-spacing:-.03em; background:linear-gradient(135deg,var(--white),var(--accent2),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .big-result-sub { font-size:13px; color:var(--gray); margin-top:8px; }
    .save-btn { width:100%; margin-top:24px; background:linear-gradient(135deg,var(--accent),#5b3fd4); border:none; border-radius:10px; padding:14px; font-size:14px; font-weight:700; color:#fff; cursor:pointer; transition:all .2s; }
    .save-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(124,92,252,.4); }
    .saved-msg { text-align:center; font-size:12px; color:var(--green); margin-top:10px; height:16px; }
    .verdict { margin-top:20px; border-radius:10px; padding:16px 20px; font-size:14px; line-height:1.7; }
    .verdict.positive { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.2); color:var(--green); }
    .verdict.negative { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.2); color:var(--red); }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-back">← Playgic Tools</a>
  <div class="nav-logo">証券担保ローン シミュレーター</div>
  <div style="width:120px"></div>
</nav>
<div class="wrap">
  <div class="page-header">
    <h1>💴 証券担保ローン シミュレーター</h1>
    <p>借入額・金利・期待リターンを入力してレバレッジ効果を可視化する。<br>結果はPlaygic全ツールに共有される。</p>
    <p style="margin-top:12px;font-size:12px;color:#555;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 14px;line-height:1.7;">⚠ 本ツールはシミュレーション目的のみです。投資・借入の判断根拠として使用しないでください。実際の運用は自己責任で行ってください。</p>
  </div>

  <div class="grid">
    <!-- 入力 -->
    <div class="card">
      <div class="card-title">入力</div>
      <div class="field"><label>借入額（円）</label><input type="number" id="amount" value="500000" oninput="calc()"></div>
      <div class="field"><label>金利（年率 %）</label><input type="number" id="rate" value="2.15" step="0.01" oninput="calc()"></div>
      <div class="field"><label>期待リターン（年率 %）</label><input type="number" id="return" value="15" step="0.1" oninput="calc()"></div>
      <div class="field"><label>運用期間（年）</label><input type="number" id="years" value="1" step="1" oninput="calc()"></div>
      <div id="verdict" class="verdict positive"></div>
    </div>

    <!-- 結果 -->
    <div class="card">
      <div class="card-title">シミュレーション結果</div>
      <div class="result-row"><span class="result-label">年間金利コスト</span><span class="result-val red" id="r-cost">—</span></div>
      <div class="result-row"><span class="result-label">月間金利コスト</span><span class="result-val red" id="r-cost-m">—</span></div>
      <div class="result-row"><span class="result-label">期待投資収益（年）</span><span class="result-val green" id="r-gain">—</span></div>
      <div class="result-row"><span class="result-label">純利益（収益−金利）</span><span class="result-val white" id="r-net">—</span></div>
      <div class="result-row"><span class="result-label">実質利回り</span><span class="result-val green" id="r-yield">—</span></div>

      <div class="big-result">
        <div class="big-result-label">レバレッジ純利益（運用期間合計）</div>
        <div class="big-result-num" id="r-total">—</div>
        <div class="big-result-sub" id="r-total-sub">—</div>
      </div>

      <button class="save-btn" onclick="save()">✓ この数字を全ツールに共有する</button>
      <div class="saved-msg" id="saved-msg"></div>
    </div>
  </div>
</div>

<script>
  function fmt(n) { return '¥' + Math.round(n).toLocaleString(); }
  function pct(n) { return n.toFixed(2) + '%'; }

  function calc() {
    const amount = Number(document.getElementById('amount').value) || 0;
    const rate   = Number(document.getElementById('rate').value)   || 0;
    const ret    = Number(document.getElementById('return').value) || 0;
    const years  = Number(document.getElementById('years').value)  || 1;

    const costYear  = amount * rate / 100;
    const costMonth = costYear / 12;
    const gainYear  = amount * ret  / 100;
    const netYear   = gainYear - costYear;
    const yieldReal = (netYear / amount) * 100;
    const totalNet  = netYear * years;

    document.getElementById('r-cost').textContent   = fmt(costYear);
    document.getElementById('r-cost-m').textContent = fmt(costMonth);
    document.getElementById('r-gain').textContent   = fmt(gainYear);
    document.getElementById('r-net').textContent    = fmt(netYear);
    document.getElementById('r-yield').textContent  = pct(yieldReal);
    document.getElementById('r-total').textContent  = fmt(totalNet);
    document.getElementById('r-total-sub').textContent = `${years}年間の累計純利益（金利コスト控除後）`;

    // 判定
    const v = document.getElementById('verdict');
    if (netYear > 0) {
      v.className = 'verdict positive';
      v.textContent = `✓ 期待リターン ${pct(ret)} に対して金利 ${pct(rate)} は十分低い。レバレッジは有効。月 ${fmt(costMonth)} のコストで年 ${fmt(gainYear)} の収益ポテンシャル。`;
    } else {
      v.className = 'verdict negative';
      v.textContent = `⚠ 期待リターンが金利を下回っている。借入は損失になる可能性がある。期待リターンを見直すか、借入を控えること。`;
    }
  }

  function save() {
    const d = JSON.parse(localStorage.getItem('playgic_data') || '{}');
    d.loan = document.getElementById('amount').value;
    d.rate = document.getElementById('rate').value;
    localStorage.setItem('playgic_data', JSON.stringify(d));
    const msg = document.getElementById('saved-msg');
    msg.textContent = '✓ 保存しました — 全ツールに反映されました';
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }

  calc();
</script>
</body>
</html>
